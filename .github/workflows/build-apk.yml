name: Build Android Web APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies with pnpm
        run: |
          pnpm install --no-frozen-lockfile

      - name: Install Web Packages for Mobile
        run: |
          cd artifacts/mobile
          pnpm add react-native-web react-dom @expo/metro-runtime

      - name: Build Web Static Files
        run: |
          cd artifacts/mobile
          pnpm expo export --platform web

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-built-app
          path: artifacts/mobile/dist/
