name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm (v9 to support Catalogs)
        uses: pnpm/action-setup@v4
        with:
          version: 9 # رفع الإصدار إلى 9 لحل مشكلة الـ catalog:

      - name: Install EAS CLI globally
        run: pnpm add -g eas-cli

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Android Offline
        run: |
          npx expo run:android --variant release --no-dev --build-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: android/app/build/outputs/apk/release/app-release.apk
