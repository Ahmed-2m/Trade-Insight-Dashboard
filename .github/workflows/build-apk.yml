name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java (Required for Android Gradle Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install EAS CLI globally
        run: pnpm add -g eas-cli

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Android APK via Gradle
        run: |
          cd artifacts/mobile
          
          # 1. توليد مجلد الـ android الأصلي صامتاً وبدون أسئلة تفاعلية
          npx expo prebuild --platform android --no-install
          
          # 2. تثبيت الحزم للتأكد من ربط جميع المكتبات الأصلية (Native Modules)
          pnpm install --no-frozen-lockfile
          
          # 3. الدخول لمجلد الأندرويد وبناء الـ APK مباشرة بدون الحاجة لجهاز متصل
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: |
            artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
            artifacts/mobile/android/app/build/outputs/apk/release/app-*.apk
