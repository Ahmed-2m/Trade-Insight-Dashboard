name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install EAS CLI globally
        run: pnpm add -g eas-cli

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild and Build Android (APK)
        run: |
          cd artifacts/mobile
          
          # أولاً: توليد مجلد أندرويد وتخطي السؤال الحواري عن طريق منع التثبيت التلقائي
          npx expo prebuild --platform android --no-install
          
          # ثانياً: تحديث حزم المشروع عبر pnpm لضمان استقرار الملفات الجديدة
          pnpm install --no-frozen-lockfile
          
          # ثالثاً: تشغيل أمر البناء النهائي للـ APK
          npx expo run:android --variant release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: |
            artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
            artifacts/mobile/android/app/build/outputs/apk/release/app-*.apk
