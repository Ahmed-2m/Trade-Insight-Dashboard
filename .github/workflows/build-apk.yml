name: Build Android APK
on:
  workflow_dispatch: # يتيح لك الضغط على Run Workflow يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # أو الإصدار الذي تفضله

      - name: Install EAS CLI globally via pnpm
        run: pnpm add -g eas-cli

      - name: Install Dependencies using pnpm
        run: pnpm install --no-frozen-lockfile

      - name: Build Android Offline
        run: |
          # بناء نسخة الـ APK باستخدام pnpm داخل بيئة الـ Expo
          npx expo run:android --variant release --no-dev --build-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: android/app/build/outputs/apk/release/app-release.apk
